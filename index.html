<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metopedia</title>
    <meta id="meta-description" name="description" content="Metopedia is a GitHub-hosted encyclopedia shell for richly linked wiki-style markup pages.">
    <meta id="meta-keywords" name="keywords" content="Metopedia, wiki, encyclopedia, GitHub Pages, MediaWiki markup, static wiki, knowledge base">
    <meta id="meta-author" name="author" content="Metopedia Foundation">
    <meta id="meta-robots" name="robots" content="index,follow,max-image-preview:large">
    <meta property="og:site_name" content="Metopedia">
    <meta id="meta-og-title" property="og:title" content="Metopedia">
    <meta id="meta-og-description" property="og:description" content="Metopedia is a GitHub-hosted encyclopedia shell for richly linked wiki-style markup pages.">
    <meta id="meta-og-type" property="og:type" content="website">
    <meta id="meta-og-image" property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/8/80/Wikipedia-logo-v2.svg">
    <meta id="meta-og-url" property="og:url" content="">
    <meta id="meta-twitter-card" name="twitter:card" content="summary_large_image">
    <meta id="meta-twitter-title" name="twitter:title" content="Metopedia">
    <meta id="meta-twitter-description" name="twitter:description" content="Metopedia is a GitHub-hosted encyclopedia shell for richly linked wiki-style markup pages.">
    <meta id="meta-twitter-image" name="twitter:image" content="https://upload.wikimedia.org/wikipedia/commons/8/80/Wikipedia-logo-v2.svg">
    <link id="meta-canonical" rel="canonical" href="">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style id="wiki-styles">
        :root {
            --bg-color: #f6f6f6;
            --content-bg: #ffffff;
            --border-color: #a2a9b1;
            --link-color: #0645ad;
            --link-visited: #0b0080;
            --link-hover: #3366cc;
            --text-color: #202122;
            --muted-color: #54595d;
            --heading-font: 'Linux Libertine', 'Georgia', 'Times', serif;
            --body-font: sans-serif;
            --code-font: 'Consolas', 'Courier New', monospace;
            --redlink-color: #ba0000;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { margin: 0; padding: 0; font-family: var(--body-font); font-size: 0.875em; line-height: 1.6; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; overflow-y: scroll; }
        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        a.redlink { color: var(--redlink-color); }
        img { max-width: 100%; height: auto; }

        #mw-page-base { height: 5em; background-position: bottom left; background-repeat: repeat-x; background-image: linear-gradient(to bottom, #ffffff 50%, #f6f6f6 100%); }
        #mw-head-base { margin-top: -5em; margin-left: 11em; height: 5em; }
        #mw-head-base::after { content: ''; display: block; clear: both; }
        #content { margin-left: 11em; padding: 1.25em 1.5em 1.5em 1.5em; background-color: var(--content-bg); border: 1px solid var(--border-color); border-right-width: 0; border-top-width: 0; min-height: 100vh; position: relative; z-index: 2; overflow-wrap: anywhere; }
        #bodyContent { min-width: 0; }
        #mw-panel { position: absolute; top: 0; width: 11em; left: 0; padding-top: 1em; }

        #p-logo { display: flex; flex-direction: column; align-items: center; width: 11em; margin-bottom: 1em; text-decoration: none; text-align: center; }
        #p-logo-mark { width: 11em; height: 7.6em; background-position: center center; background-repeat: no-repeat; }
        #p-logo-text { font-family: var(--heading-font); font-size: 1.4em; display: block; letter-spacing: 1px; color: #000; line-height: 1; margin-top: 0.1em; }

        .portal { margin: 0 0.6em 0 0.7em; padding: 0.25em 0; direction: ltr; }
        .portal h3 { font-size: 0.75em; color: var(--muted-color); font-weight: normal; margin: 0.5em 0 0 0.66em; padding: 0.25em 0; cursor: default; border-bottom: 1px solid #c8ccd1; }
        .portal ul { list-style: none; margin: 0; padding: 0.3em 0 0 0; }
        .portal li { margin: 0; padding: 0.25em 0; font-size: 0.75em; line-height: 1.125em; }
        .portal li a, .portal li button { color: var(--link-color); text-decoration: none; background: none; border: none; padding: 0; font: inherit; cursor: pointer; text-align: left; }
        .portal li a:hover, .portal li button:hover { text-decoration: underline; }

        #left-navigation { float: left; margin-top: 2.5em; margin-bottom: -1px; }
        #right-navigation { float: right; margin-top: 2.5em; margin-bottom: -1px; }
        .vectorTabs { float: left; height: 2.5em; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAsCAYAAAC0RofqAAAAKElEQVQIW2P4//8/Awx/IBngEMX/YcRwkA2B+BWEr8AwCq9n0E0kDwAAy00v68205+EAAAAASUVORK5CYII='); background-position: left bottom; background-repeat: repeat-x; padding-left: 1px; }
        .vectorTabs ul { float: left; height: 100%; list-style: none; margin: 0; padding: 0; }
        .vectorTabs li { float: left; line-height: 1.125em; display: block; height: 100%; margin: 0; padding: 0; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAsCAYAAAC0RofqAAAAIklEQVQIW2P4//8/Awx/IBngEMX/YcRwkA2B+BWEr8AwCq9n0E0kDwAAmUgv6+6T5ZAAAAAASUVORK5CYII='); background-position: right bottom; background-repeat: no-repeat; }
        .vectorTabs li.selected { background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAsCAYAAAC0RofqAAAAIUlEQVQIW2P4//8/Awx/QJjhw4cPUXwGI34FhlF4PYNuInkAAGZDL+uv/v/1AAAAAElFTkSuQmCC'); }
        .vectorTabs li a, .vectorTabs li button { display: block; height: 2.5em; padding-top: 1.25em; padding-left: 0.5em; padding-right: 0.5em; color: var(--link-color); cursor: pointer; text-decoration: none; font-size: 0.8em; background: transparent; border: 0; font-family: inherit; }
        .vectorTabs li.selected a, .vectorTabs li.selected button { color: #333; text-decoration: none; cursor: default; }

        #p-search { float: left; margin-right: 1.5em; margin-left: 0.5em; margin-top: 2.8em; }
        #p-search form { margin: 0; }
        #simpleSearch { display: flex; align-items: center; width: 20vw; min-width: 5em; max-width: 20em; background-color: #fff; border: 1px solid #a2a9b1; padding: 0.2em 0.4em; border-radius: 2px; }
        #simpleSearch input { flex: 1; width: 100%; background: transparent; border: none; box-shadow: none; outline: none; font-size: 0.8em; min-width: 0; }
        #simpleSearch button { background: transparent; border: 0; color: var(--muted-color); cursor: pointer; font-size: 1.1em; line-height: 1; }

        #firstHeading { font-family: var(--heading-font); font-weight: normal; margin-bottom: 0.25em; overflow: hidden; border-bottom: 1px solid var(--border-color); font-size: 1.8em; line-height: 1.3; }
        #siteSub { font-size: 84%; color: var(--muted-color); margin-top: 0; margin-bottom: 1.5em; }
        #pageStatus { display: none; margin: 0 0 1em 0; padding: 0.75em 1em; border: 1px solid #c8ccd1; background: #f8f9fa; color: var(--muted-color); }
        #loading-indicator { color: var(--muted-color); }

        .mw-parser-output h1, .mw-parser-output h2 { font-family: var(--heading-font); font-weight: normal; }
        .mw-parser-output h1 { font-size: 1.8em; border-bottom: 1px solid var(--border-color); margin-bottom: 0.25em; }
        .mw-parser-output h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); margin-top: 1em; margin-bottom: 0.25em; padding-bottom: 2px; clear: both; }
        .mw-parser-output h3 { font-family: var(--body-font); font-size: 1.2em; font-weight: bold; margin-top: 0.3em; margin-bottom: 0.3em; }
        .mw-parser-output h4, .mw-parser-output h5, .mw-parser-output h6 { font-family: var(--body-font); font-weight: bold; margin-top: 0.3em; margin-bottom: 0.3em; }
        .mw-parser-output p { margin: 0.5em 0; line-height: 1.6; }
        .mw-parser-output ul { margin: 0.3em 0 0 1.6em; padding: 0; list-style-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="5" height="5"><rect width="5" height="5" fill="%230645ad"/></svg>'); }
        .mw-parser-output ol { margin: 0.3em 0 0 3.2em; padding: 0; list-style-type: decimal; }
        .mw-parser-output li { margin-bottom: 0.1em; }
        .mw-parser-output dl { margin-top: 0.2em; margin-bottom: 0.5em; }
        .mw-parser-output dt { font-weight: bold; margin-bottom: 0.1em; }
        .mw-parser-output dd { margin-left: 1.6em; margin-bottom: 0.1em; }
        .mw-parser-output blockquote { font-family: var(--heading-font); margin: 1em 2.5em; padding-left: 1em; border-left: 4px solid #c8ccd1; font-size: 1.1em; color: #444; background: #fdfdfd; }
        .mw-parser-output hr { height: 1px; border: 0; background-color: var(--border-color); margin: 1em 0; }
        .mw-parser-output pre, .mw-parser-output .mw-highlight, .mw-parser-output .score-block { border: 1px dashed #2f6fab; padding: 1em; background-color: #f8f9fa; color: #000; overflow-x: auto; font-family: var(--code-font); font-size: 0.9em; white-space: pre-wrap; margin: 1em 0; line-height: 1.3em; }
        .mw-parser-output code, .mw-parser-output kbd { font-family: var(--code-font); background-color: #f8f9fa; border: 1px solid #eaecf0; padding: 1px 4px; border-radius: 2px; }
        .mw-parser-output a.external { background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"><path fill="%230645ad" d="M21 13v10h-21v-19h12v2h-10v15h17v-8h2zm3-12h-10.988l4.035 4-6.977 7.07 2.828 2.828 6.977-7.07 4.125 4.172v-11z"/></svg>') no-repeat right center; padding-right: 13px; }

        .wikitable { background-color: #f8f9fa; color: #202122; margin: 1em 0; border: 1px solid #a2a9b1; border-collapse: collapse; max-width: 100%; }
        .wikitable-wrap, .navbox-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .wikitable > tbody > tr > th, .wikitable > tbody > tr > td, .wikitable tr th, .wikitable tr td { border: 1px solid #a2a9b1; padding: 0.2em 0.4em; vertical-align: top; }
        .wikitable > tbody > tr > th, .wikitable tr th { background-color: #eaecf0; text-align: center; }

        .infobox { float: right; clear: right; margin: 0 0 1em 1em; border: 1px solid var(--border-color); background-color: #f8f9fa; padding: 0.2em; font-size: 88%; width: 22em; line-height: 1.5em; }
        .infobox th, .infobox td { vertical-align: top; padding: 0.2em 0.6em; }
        .infobox .infobox-header { text-align: center; font-size: 125%; font-weight: bold; background-color: #e0e0e0; }
        .infobox .infobox-subheader { text-align: center; background-color: #f0f0f0; font-weight: bold; border-top: 1px solid #ccc; }
        .infobox .infobox-label { text-align: left; background-color: #eaecf0; width: 35%; font-weight: bold; }
        .infobox .infobox-image { text-align: center; padding: 0.8em !important; background: #fff; }

        .thumb { border: 1px solid #c8ccd1; background-color: #f8f9fa; padding: 3px; margin: 0.5em 0 1.3em 0; clear: both; }
        .tright { float: right; clear: right; margin-left: 1.4em; }
        .tleft { float: left; clear: left; margin-right: 1.4em; }
        .tcenter { margin: 0.5em auto; display: table; clear: both; }
        .thumbcaption { padding: 3px; font-size: 94%; color: #54595d; line-height: 1.4; }

        .gallery { display: flex; flex-wrap: wrap; gap: 10px; margin: 1em 0; list-style: none; padding: 0; }
        .gallerybox { width: 155px; border: 1px solid #ccc; background: #f9f9f9; padding: 5px; text-align: center; font-size: 85%; }
        .gallerybox img { display: block; margin: 0 auto 4px auto; }

        .toc { display: inline-table; background-color: #f8f9fa; border: 1px solid var(--border-color); padding: 7px; margin-top: 1em; margin-bottom: 1em; font-size: 95%; min-width: 180px; }
        .toc-title { text-align: center; margin-bottom: 5px; }
        .toc-title h2 { display: inline; border: none !important; font-size: 100% !important; font-family: var(--body-font) !important; font-weight: bold !important; margin: 0 !important; }
        .toc ul { list-style: none !important; margin: 0 !important; padding: 0 1.5em 0 0 !important; background: none !important; }
        .toc li { margin-bottom: 0.2em; list-style-image: none !important; }
        .toc-number { color: #202122; padding-right: 0.5em; }
        .toc-level-3 { padding-left: 1.2em; }
        .toc-level-4 { padding-left: 2.4em; }

        .hatnote { font-style: italic; margin-bottom: 0.5em; padding-left: 1.6em; color: #202122; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23a2a9b1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>') no-repeat left 2px; background-size: 14px; }
        .quote-box { font-family: var(--heading-font); margin: 1em 2em; padding: 1em; border-left: 4px solid #c8ccd1; background-color: #f8f9fa; font-size: 1.1em; color: #444; }
        .quote-author { display: block; text-align: right; font-size: 0.85em; margin-top: 0.5em; color: #54595d; font-family: var(--body-font); font-style: normal; }
        .poem { font-family: var(--heading-font); font-style: italic; white-space: pre-wrap; margin: 1em 2em; }
        .navbox { border: 1px solid #a2a9b1; width: 100%; margin: 1.5em auto; clear: both; font-size: 88%; text-align: center; padding: 1px; background-color: #f8f9fa; border-collapse: separate; border-spacing: 2px; }
        .navbox th { background-color: #ccddff; padding: 0.3em; border: 1px solid #fdfdfd; }
        .navbox-title { font-size: 110%; }
        .navbox-group { background-color: #ddddff; text-align: right; padding: 0.2em 1em; width: 12%; white-space: nowrap; font-weight: bold; border: 1px solid #fdfdfd; }
        .navbox-list { text-align: left; padding: 0.2em 0.5em; border-left: 2px solid #fdfdfd; width: 88%; }
        .navbox-list ul { margin: 0 !important; padding: 0 !important; list-style: none !important; display: inline; }
        .navbox-list li { display: inline-block; margin: 0; padding: 0; list-style-image: none !important; }
        .navbox-list li::after { content: ' • '; color: #202122; font-weight: bold; }
        .navbox-list li:last-child::after { content: ''; }

        .reference { font-size: 80%; line-height: 1; vertical-align: super; unicode-bidi: isolate; }
        .references { font-size: 90%; margin-top: 0.3em; }
        .references li:target { background-color: #def; }
        .mw-cite-backlink { color: var(--link-color); font-family: var(--body-font); padding-right: 0.2em; }

        .catlinks { border: 1px solid #a2a9b1; background-color: #f8f9fa; padding: 0.5em; margin-top: 1.5em; clear: both; font-size: 90%; }
        .catlinks ul { display: inline; list-style: none !important; margin: 0 !important; padding: 0 !important; }
        .catlinks li { display: inline-block; border-left: 1px solid #a2a9b1; padding: 0 0.5em; margin: 0; list-style-image: none !important; }
        .catlinks li:first-child { border-left: none; }

        .search-results-list { margin-left: 0; padding-left: 1.4em; }
        .search-hit-meta { font-size: 0.9em; color: var(--muted-color); }
        .empty-state { padding: 1em; border: 1px solid #c8ccd1; background: #f8f9fa; }
        .new-page-path { font-family: var(--code-font); font-size: 0.95em; }

        #footer { margin-left: 11em; margin-top: 0; padding: 1.25em; direction: ltr; font-size: 0.75em; color: #202122; border-top: 1px solid #a2a9b1; }
        #footer-license { margin-bottom: 1em; }
        #footer ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 1em; flex-wrap: wrap; }
        #footer li { margin: 0; }
        #footer a { color: var(--link-color); text-decoration: none; }
        #footer a:hover { text-decoration: underline; }

        @media (max-width: 1080px) {
            #mw-panel { display: none; }
            #mw-page-base { height: 0; background-image: none; }
            #mw-head-base { margin: 0; height: auto; padding: 0.5em 0.75em 0 0.75em; display: flex; flex-direction: column; gap: 0.45em; }
            #content, #footer { margin-left: 0; }
            #content { padding: 1em 0.95em 1.35em 0.95em; border-right-width: 1px; min-height: 0; }
            #footer { padding: 1em 0.95em 1.25em 0.95em; }
            #left-navigation, #right-navigation { float: none; width: 100%; margin: 0; }
            #right-navigation { display: flex; flex-direction: column; gap: 0.45em; }
            #p-search { float: none; margin: 0; width: 100%; }
            #simpleSearch { width: 100%; max-width: none; }
            .vectorTabs { float: none; max-width: 100%; overflow-x: auto; overflow-y: hidden; }
            .vectorTabs ul { float: none; display: flex; min-width: max-content; }
            .vectorTabs li { float: none; flex: 0 0 auto; }
            .infobox { float: none; clear: both; width: 100%; max-width: 100%; margin: 0 0 1em 0; }
            .tright, .tleft, .tcenter, .thumb { float: none !important; clear: both; margin: 0 auto 1em auto; display: block; max-width: 100%; }
            .thumb .thumbinner { width: auto !important; max-width: 100% !important; }
            .wikitable, .navbox { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .toc { display: block; max-width: 100%; overflow-x: auto; }
            .gallery { justify-content: center; }
            .quote-box, .poem, .mw-parser-output blockquote { margin: 1em 0; }
            .mw-parser-output ul { margin-left: 1.4em; }
            .mw-parser-output ol { margin-left: 2em; }
            .mw-parser-output pre, .mw-parser-output .mw-highlight, .mw-parser-output .score-block { white-space: pre; }
            #pageStatus, .new-page-path, .search-hit-meta { overflow-wrap: anywhere; }
        }

        @media (max-width: 640px) {
            body { font-size: 15px; }
            #content { padding: 0.9em 0.75em 1.2em 0.75em; }
            #footer { padding: 0.9em 0.75em 1.1em 0.75em; }
            #firstHeading { font-size: 1.65em; }
            #siteSub { margin-bottom: 1em; }
            .mw-parser-output h2 { font-size: 1.35em; }
            .mw-parser-output h3 { font-size: 1.1em; }
            .vectorTabs li a, .vectorTabs li button { padding-left: 0.65em; padding-right: 0.65em; }
            .catlinks li, #footer li { display: block; border-left: 0; padding: 0.2em 0; }
            .gallerybox { width: min(100%, 170px); }
        }
    </style>
</head>
<body>
    <div id="mw-page-base"></div>
    <div id="mw-head-base">
        <div id="left-navigation">
            <div class="vectorTabs">
                <ul>
                    <li class="selected" id="tab-read"><a>Read</a></li>
                    <li id="tab-source"><button type="button" id="view-source-btn">View source</button></li>
                </ul>
            </div>
        </div>
        <div id="right-navigation">
            <div id="p-search">
                <form id="search-form">
                    <div id="simpleSearch">
                        <input type="search" id="searchInput" placeholder="Search Metopedia" autocomplete="off">
                        <button type="submit" aria-label="Search">⌕</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="mw-panel">
        <a id="p-logo" href="#/Main_Page">
            <div id="p-logo-mark" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><polygon points=\'20,80 50,20 80,80 50,60\' stroke=\'%23333\' stroke-width=\'4\' fill=\'%23f6f6f6\'/><path d=\'M50 20 L50 60\' stroke=\'%23333\' stroke-width=\'2\'/></svg>'); background-size: 100px;"></div>
            <span id="p-logo-text">METOPEDIA</span>
        </a>
        <div id="sidebar-content"></div>
    </div>

    <div id="content">
        <h1 id="firstHeading">Loading...</h1>
        <div id="siteSub">From Metopedia, the free encyclopedia</div>
        <div id="pageStatus"></div>
        <div id="bodyContent" class="mw-parser-output">
            <div id="loading-indicator">Parsing and rendering wiki markup...</div>
            <div id="rendered-content"></div>
        </div>
    </div>

    <div id="footer">
        <div id="footer-license"></div>
        <ul id="footer-links"></ul>
    </div>

    <script type="application/json" id="app-config">
    {
      "siteName": "Metopedia",
      "siteTagline": "From Metopedia, the free encyclopedia",
      "defaultPage": "Main_Page",
      "contentBasePath": "./wiki",
      "pageExtensions": [".wiki", ".txt", ".md"],
      "indexPath": "./site-index.json",
      "canonicalBaseUrl": "",
      "sourceBaseUrl": "",
      "licenseHtml": "Text is available under the <a href=\"https://creativecommons.org/licenses/by-sa/4.0/\">Creative Commons Attribution-ShareAlike 4.0 License</a>; additional terms may apply. By using this site, you agree to the <a href=\"#/Terms_of_Use\">Terms of Use</a> and <a href=\"#/Privacy_Policy\">Privacy Policy</a>. Wikipedia® is a registered trademark of the Wikimedia Foundation, Inc., a non-profit organization.",
      "defaultSeo": {
        "title": "Metopedia",
        "description": "Metopedia is a GitHub-hosted encyclopedia shell for richly linked wiki-style markup pages.",
        "keywords": "Metopedia, wiki, encyclopedia, GitHub Pages, MediaWiki markup, static wiki, knowledge base",
        "author": "Metopedia Foundation",
        "image": "https://upload.wikimedia.org/wikipedia/commons/8/80/Wikipedia-logo-v2.svg",
        "robots": "index,follow,max-image-preview:large"
      },
      "collections": {
        "sidebarFolder": "./sidebar",
        "toolsFolder": "./tools",
        "footerFolder": "./footer"
      },
      "githubRepo": {
        "enabled": false,
        "owner": "",
        "repo": "",
        "branch": "main"
      }
    }
    </script>

    <script type="application/json" id="repo-sidebar">
    {
      "Navigation": [
        {"label": "Main page", "link": "Main_Page"},

'''Metopedia''' is a GitHub-hosted encyclopedia shell designed to render a broad subset of Wikipedia-style markup from plain text files. This page showcases the supported markup in one place and serves as the fallback main page for the site.<ref name="core">Metopedia core design note: keep the shell stable and let the content files do the work.</ref>

{{Main|About}}
{{See also|Help:Wiki_markup|Special:Sitemap}}

== What this core supports ==
* Internal links like [[About]] and [[Help:Wiki_markup|namespaced links]]
* Automatic links to pages that do not exist yet, such as [[Unwritten_Page]]
* External links such as [https://www.wikipedia.org Wikipedia]
* Inline and reusable citations<ref name="refs">Named references can be reused without repeating their content.</ref>
* Tables, infoboxes, thumbnails, galleries, categories, and table of contents
* Front matter driven SEO fields for page-level metadata
* Special pages such as [[Special:Sitemap]], [[Special:Search]], [[Special:AllPages]], and [[Special:Categories]]
* Dynamic footer, sidebar, and tool link loading from local JSON or optional GitHub folder listings

{{short description|About the Metopedia core shell and its GitHub-oriented architecture.}}
= About Metopedia =
Metopedia uses a Wikipedia-like shell with static text pages stored in a GitHub repository. The page frame comes from the core HTML, while articles come from plain text files in your content folders.

== Core ideas ==
* Use a stable shell based on the classic Vector look
* Keep articles as editable markup files
* Support folder-based navigation and GitHub Pages deployment
* Let front matter control per-page metadata and SEO
* Allow unresolved pages to remain linked so the structure can be built before every article exists

== Recommended repo structure ==
{| class="wikitable"
|+ Core layout
! Path !! Purpose
|-
| /index.html || Main shell
|-
| /wiki/*.wiki || Standard article pages
|-
| /wiki/Help/*.wiki || Namespaced help pages
|-
| /sidebar/ || Sidebar portal definitions or folder-driven link sources
|-
| /tools/ || Tool portal definitions or folder-driven link sources
|-
| /footer/ || Footer link definitions or folder-driven link sources
|-
| /site-index.json || Search, sitemap, and category index
|}

== SEO model ==
Pages can start with YAML-style front matter:
<pre>
---
title: "Page title"
description: "Page summary"
keywords: "keyword 1, keyword 2"
ogImage: "https://example.com/image.png"
author: "Author name"
robots: "index,follow"
canonical: "https://example.com/page"
---
</pre>
The shell uses those fields to update the document title, description, Open Graph data, Twitter cards, author, robots, and canonical URL.

== Navigation model ==
Internal links always resolve to hash routes such as <code>#/About</code> or <code>#/Help:Wiki_markup</code>. If a page does not exist yet, the shell still routes there and shows a readable creation path.

    <script>
    const appConfig = JSON.parse(document.getElementById('app-config').textContent);
    const embeddedSidebar = JSON.parse(document.getElementById('repo-sidebar').textContent);
    const embeddedFooter = JSON.parse(document.getElementById('repo-footer').textContent);
    const contentDiv = document.getElementById('rendered-content');
    const headingDiv = document.getElementById('firstHeading');
    const subHeadingDiv = document.getElementById('siteSub');
    const sideDiv = document.getElementById('sidebar-content');
    const footerLinksDiv = document.getElementById('footer-links');
    const footerLicenseDiv = document.getElementById('footer-license');
    const loader = document.getElementById('loading-indicator');
    const pageStatus = document.getElementById('pageStatus');
    const tabRead = document.getElementById('tab-read');
    const tabSource = document.getElementById('tab-source');
    const viewSourceBtn = document.getElementById('view-source-btn');

    let siteIndex = null;
    let currentSlug = '';
    let currentRaw = '';
    let currentResolvedFrom = '';
    let currentCategories = [];
    let currentShortDescription = '';
    let currentViewMode = 'read';
    let sidebarCache = null;
    let footerCache = null;
    let repoTreeCache = null;
    let cachedPageRegistry = null;

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function safeAttr(text) {
        return escapeHtml(text).replace(/`/g, '&#96;');
    }

    function slugToTitle(slug) {
        return String(slug || '').replace(/_/g, ' ');
    }

    function titleToSlug(title) {
        return String(title || '').trim().replace(/\s+/g, '_');
    }

    function normalizeSlug(slug) {
        let value = decodeURIComponent(String(slug || '').replace(/^#\/?/, '')).trim();
        if (!value) value = appConfig.defaultPage;
        value = value.replace(/^\/+/, '');
        return titleToSlug(value);
    }

    function getPageId() {
        const hash = window.location.hash;
        if (hash && hash.startsWith('#/')) return normalizeSlug(hash.slice(2));
        if (hash && hash.length > 1) return normalizeSlug(hash.slice(1));
        return appConfig.defaultPage;
    }

    function navigateTo(slug, mode = 'read') {
        currentViewMode = mode;
        const normalized = normalizeSlug(slug);
        const target = '#/' + normalized;
        if (window.location.hash === target) {
            loadPage(normalized, mode);
        } else {
            window.location.hash = target;
        }
    }

    function setTab(mode) {
        if (mode === 'source') {
            tabSource.classList.add('selected');
            tabRead.classList.remove('selected');
        } else {
            tabRead.classList.add('selected');
            tabSource.classList.remove('selected');
        }
    }

    function showStatus(message, visible = true) {
        pageStatus.style.display = visible ? 'block' : 'none';
        pageStatus.innerHTML = visible ? message : '';
    }

    function normalizeLinkValue(link) {
        const raw = String(link || '').trim();
        if (!raw) return '#/' + appConfig.defaultPage;
        if (/^(https?:|mailto:|tel:|javascript:)/i.test(raw)) return raw;
        return '#/' + normalizeSlug(raw);
    }

    function renderLinkList(items) {
        return items.map(item => {
            const label = escapeHtml(item.label || slugToTitle(item.link || ''));
            const href = normalizeLinkValue(item.link || item.href || '');
            if (/^javascript:/i.test(href)) {
                return `<li><button type="button" data-js-action="${safeAttr(href.replace(/^javascript:/i, ''))}">${label}</button></li>`;
            }
            if (/^(https?:|mailto:|tel:)/i.test(href)) {
                return `<li><a href="${safeAttr(href)}" target="_blank" rel="noopener">${label}</a></li>`;
            }
            return `<li><a href="${safeAttr(href)}">${label}</a></li>`;
        }).join('');
    }

    function attachActionHandlers(root = document) {
        root.querySelectorAll('[data-js-action]').forEach(node => {
            node.addEventListener('click', event => {
                const action = node.getAttribute('data-js-action') || '';
                if (action === 'window.print()') {
                    event.preventDefault();
                    window.print();
                }
            });
        });
    }

    async function fetchJson(url) {
        try {
            const res = await fetch(url, { cache: 'no-cache' });
            if (!res.ok) return null;
            return await res.json();
        } catch {
            return null;
        }
    }

    async function fetchText(url) {
        try {
            const res = await fetch(url, { cache: 'no-cache' });
            if (!res.ok) return null;
            return await res.text();
        } catch {
            return null;
        }
    }

    function githubEnabled() {
        return !!(appConfig.githubRepo && appConfig.githubRepo.enabled && appConfig.githubRepo.owner && appConfig.githubRepo.repo);
    }

    function githubRawUrl(path) {
        const { owner, repo, branch } = appConfig.githubRepo;
        return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path.replace(/^\.\//, '')}`;
    }

    async function getRepoTree() {
        if (!githubEnabled()) return null;
        if (repoTreeCache) return repoTreeCache;
        const { owner, repo, branch } = appConfig.githubRepo;
        const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${encodeURIComponent(branch)}?recursive=1`;
        try {
            const res = await fetch(url, { cache: 'no-cache' });
            if (!res.ok) throw new Error('tree fetch failed');
            const data = await res.json();
            repoTreeCache = Array.isArray(data.tree) ? data.tree : [];
        } catch {
            repoTreeCache = null;
        }
        return repoTreeCache;
    }

    function embeddedPage(slug) {
        const node = Array.from(document.querySelectorAll('script[data-slug]')).find(el => normalizeSlug(el.dataset.slug) === normalizeSlug(slug));
        return node ? node.textContent.trim() : null;
    }

    async function loadSidebarConfig() {
        if (sidebarCache) return sidebarCache;
        const localIndex = await fetchJson(`${appConfig.collections.sidebarFolder}/index.json`);
        const localToolsIndex = await fetchJson(`${appConfig.collections.toolsFolder}/index.json`);
        let merged = structuredClone ? structuredClone(embeddedSidebar) : JSON.parse(JSON.stringify(embeddedSidebar));
        if (localIndex && typeof localIndex === 'object' && !Array.isArray(localIndex)) merged = Object.assign(merged, localIndex);
        if (localToolsIndex) {
            if (Array.isArray(localToolsIndex)) merged.Tools = localToolsIndex;
            else if (typeof localToolsIndex === 'object' && !Array.isArray(localToolsIndex)) Object.assign(merged, localToolsIndex);
        }
        if (!localIndex && githubEnabled()) {
            const tree = await getRepoTree();
            if (Array.isArray(tree)) {
                const folders = [appConfig.collections.sidebarFolder, appConfig.collections.toolsFolder].map(x => String(x || '').replace(/^\.\//, '').replace(/\/$/, ''));
                for (const folder of folders) {
                    const matches = tree.filter(item => item.type === 'blob' && item.path.startsWith(folder + '/') && item.path.endsWith('.json'));
                    for (const item of matches) {
                        const payload = await fetchJson(githubRawUrl(item.path));
                        if (!payload) continue;
                        if (Array.isArray(payload)) {
                            const portalName = folder.endsWith('tools') || folder.endsWith('/tools') ? 'Tools' : item.path.split('/').pop().replace(/\.json$/i, '').replace(/_/g, ' ');
                            merged[portalName] = payload;
                        } else if (typeof payload === 'object') {
                            if (Array.isArray(payload.items)) {
                                const title = payload.title || item.path.split('/').pop().replace(/\.json$/i, '').replace(/_/g, ' ');
                                merged[title] = payload.items;
                            } else {
                                Object.assign(merged, payload);
                            }
                        }
                    }
                }
            }
        }
        sidebarCache = merged;
        return sidebarCache;
    }

    async function loadFooterConfig() {
        if (footerCache) return footerCache;
        const localIndex = await fetchJson(`${appConfig.collections.footerFolder}/index.json`);
        let merged = Array.isArray(localIndex) ? localIndex : embeddedFooter;
        if (!localIndex && githubEnabled()) {
            const tree = await getRepoTree();
            const folder = String(appConfig.collections.footerFolder || '').replace(/^\.\//, '').replace(/\/$/, '');
            if (Array.isArray(tree)) {
                const jsonMatches = tree.filter(item => item.type === 'blob' && item.path.startsWith(folder + '/') && item.path.endsWith('.json'));
                if (jsonMatches.length) {
                    const gathered = [];
                    for (const item of jsonMatches) {
                        const payload = await fetchJson(githubRawUrl(item.path));
                        if (Array.isArray(payload)) gathered.push(...payload);
                        else if (payload && Array.isArray(payload.items)) gathered.push(...payload.items);
                        else if (payload && payload.label && payload.link) gathered.push(payload);
                    }
                    if (gathered.length) merged = gathered;
                }
            }
        }
        footerCache = merged;
        return footerCache;
    }

    async function renderChrome(categories = []) {
        const sidebar = await loadSidebarConfig();
        const footer = await loadFooterConfig();
        sideDiv.innerHTML = Object.entries(sidebar).map(([portal, items]) => {
            if (!Array.isArray(items) || !items.length) return '';
            return `<div class="portal"><h3>${escapeHtml(portal)}</h3><ul>${renderLinkList(items)}</ul></div>`;
        }).join('');
        footerLicenseDiv.innerHTML = appConfig.licenseHtml;
        footerLinksDiv.innerHTML = renderLinkList(footer);
        attachActionHandlers();
        if (categories.length) {
            const catHtml = `<div class="catlinks"><span>Categories:</span><ul>${categories.map(cat => `<li><a href="#/${safeAttr(normalizeSlug('Category:' + cat))}">${escapeHtml(cat)}</a></li>`).join('')}</ul></div>`;
            const existing = contentDiv.querySelector('.catlinks');
            if (existing) existing.remove();
            contentDiv.insertAdjacentHTML('beforeend', catHtml);
        }
    }

    async function loadIndex() {
        if (siteIndex !== null) return siteIndex;
        const local = await fetchJson(appConfig.indexPath);
        if (Array.isArray(local)) {
            siteIndex = local;
            return siteIndex;
        }
        if (local && Array.isArray(local.pages)) {
            siteIndex = local.pages;
            return siteIndex;
        }
        const embedded = Array.from(document.querySelectorAll('script[data-slug]')).map(node => {
            const slug = normalizeSlug(node.dataset.slug);
            const raw = node.textContent;
            const categories = [...raw.matchAll(/\[\[Category:([^\]|]+)(?:\|[^\]]*)?\]\]/gi)].map(match => match[1].trim());
            const front = parseFrontMatter(raw);
            return {
                slug,
                title: front.meta.title || slugToTitle(slug),
                description: front.meta.description || '',
                categories,
                path: null,
                source: 'embedded'
            };
        });
        if (githubEnabled()) {
            const tree = await getRepoTree();
            if (Array.isArray(tree)) {
                const base = String(appConfig.contentBasePath || '').replace(/^\.\//, '').replace(/\/$/, '');
                const exts = new Set((appConfig.pageExtensions || []).map(ext => ext.toLowerCase()));
                const pages = tree.filter(item => item.type === 'blob' && item.path.startsWith(base + '/') && exts.has(item.path.slice(item.path.lastIndexOf('.')).toLowerCase())).map(item => {
                    const relative = item.path.slice(base.length + 1).replace(/\.[^.]+$/, '');
                    const slug = normalizeSlug(relative.replace(/\//g, ':'));
                    return { slug, title: slugToTitle(slug), categories: [], path: './' + item.path, source: 'github-tree' };
                });
                const mergedMap = new Map();
                [...embedded, ...pages].forEach(item => mergedMap.set(normalizeSlug(item.slug || item.title), Object.assign({}, mergedMap.get(normalizeSlug(item.slug || item.title)) || {}, item)));
                siteIndex = Array.from(mergedMap.values());
                return siteIndex;
            }
        }
        siteIndex = embedded;
        return siteIndex;
    }

    function parseFrontMatter(raw) {
        const text = String(raw || '').replace(/^\uFEFF/, '');
        const match = text.match(/^---\n([\s\S]*?)\n---\n?/);
        if (!match) return { meta: {}, body: text };
        const meta = {};
        match[1].split(/\n/).forEach(line => {
            const idx = line.indexOf(':');
            if (idx === -1) return;
            const key = line.slice(0, idx).trim();
            let value = line.slice(idx + 1).trim();
            value = value.replace(/^['"]|['"]$/g, '');
            meta[key] = value;
        });
        return { meta, body: text.slice(match[0].length) };
    }

    function pageCandidates(slug) {
        const normalized = normalizeSlug(slug);
        const rawPath = normalized.replace(/:/g, '/');
        const extList = Array.isArray(appConfig.pageExtensions) && appConfig.pageExtensions.length ? appConfig.pageExtensions : ['.wiki'];
        const candidates = [];
        if (Array.isArray(siteIndex)) {
            const hit = siteIndex.find(item => normalizeSlug(item.slug || item.path || item.title) === normalized);
            if (hit && hit.path) candidates.push(hit.path);
        }
        extList.forEach(ext => {
            candidates.push(`${appConfig.contentBasePath}/${rawPath}${ext}`);
            candidates.push(`${appConfig.contentBasePath}/${normalized}${ext}`);
        });
        return [...new Set(candidates)];
    }

    function creationPath(slug) {
        return `${String(appConfig.contentBasePath || './wiki').replace(/\/$/, '')}/${normalizeSlug(slug).replace(/:/g, '/')}.wiki`;
    }

    async function fetchPageText(slug) {
        const embedded = embeddedPage(slug);
        if (embedded !== null) return { raw: embedded, resolvedFrom: 'embedded' };
        await loadIndex();
        for (const path of pageCandidates(slug)) {
            const raw = await fetchText(path);
            if (raw !== null) return { raw, resolvedFrom: path };
            if (githubEnabled() && path.startsWith('./')) {
                const githubRaw = await fetchText(githubRawUrl(path.replace(/^\.\//, '')));
                if (githubRaw !== null) return { raw: githubRaw, resolvedFrom: githubRawUrl(path.replace(/^\.\//, '')) };
            }
        }
        return {
            raw: `= 404 Not Found =\nThe page '''${slugToTitle(slug)}''' does not exist yet.\n\nYou can still link to it now, and create it later.\n\n== Suggested file path ==\n<code>${escapeHtml(creationPath(slug))}</code>\n\n== Useful next steps ==\n* Return to [[Main_Page]]\n* Open [[Help:Wiki_markup]]\n* Review [[Special:Sitemap|the sitemap]]`,
            resolvedFrom: null,
            notFound: true
        };
    }

    function randomPageSlug() {
        if (!Array.isArray(siteIndex) || !siteIndex.length) return appConfig.defaultPage;
        const realPages = siteIndex.filter(item => {
            const slug = normalizeSlug(item.slug || item.title);
            return !/^Special:/.test(slug) && !/^Category:/.test(slug);
        });
        if (!realPages.length) return appConfig.defaultPage;
        const pick = realPages[Math.floor(Math.random() * realPages.length)];
        return normalizeSlug(pick.slug || pick.title);
    }

    function knownPageSet() {
        if (cachedPageRegistry) return cachedPageRegistry;
        cachedPageRegistry = new Set(Array.from(document.querySelectorAll('script[data-slug]')).map(node => normalizeSlug(node.dataset.slug)));
        if (Array.isArray(siteIndex)) {
            siteIndex.forEach(item => cachedPageRegistry.add(normalizeSlug(item.slug || item.title)));
        }
        ['Special:Sitemap', 'Special:Search', 'Special:AllPages', 'Special:Categories', 'Special:RecentChanges', 'Special:Random'].forEach(item => cachedPageRegistry.add(item));
        return cachedPageRegistry;
    }

    function isKnownPage(target) {
        const slug = normalizeSlug(target);
        if (/^#/.test(target)) return true;
        return knownPageSet().has(slug) || /^Category:/.test(slug) || /^Special:/.test(slug);
    }

    function parseCsvList(value) {
        return String(value || '').split(',').map(part => part.trim()).filter(Boolean);
    }

    function updateMeta(slug, meta = {}) {
        const defaults = appConfig.defaultSeo || {};
        const title = meta.title || meta.seoTitle || slugToTitle(slug);
        const description = meta.description || currentShortDescription || defaults.description || '';
        const keywords = meta.keywords || defaults.keywords || '';
        const author = meta.author || defaults.author || '';
        const image = meta.ogImage || meta.image || defaults.image || '';
        const robots = meta.robots || defaults.robots || 'index,follow';
        const pageTitle = title === appConfig.siteName ? title : `${title} - ${appConfig.siteName}`;
        const canonical = meta.canonical || (appConfig.canonicalBaseUrl ? `${appConfig.canonicalBaseUrl.replace(/\/$/, '')}/#/${normalizeSlug(slug)}` : `${window.location.origin}${window.location.pathname}#/${normalizeSlug(slug)}`);
        document.title = pageTitle;
        document.getElementById('meta-description').setAttribute('content', description);
        document.getElementById('meta-keywords').setAttribute('content', keywords);
        document.getElementById('meta-author').setAttribute('content', author);
        document.getElementById('meta-robots').setAttribute('content', robots);
        document.getElementById('meta-og-title').setAttribute('content', title);
        document.getElementById('meta-og-description').setAttribute('content', description);
        document.getElementById('meta-og-image').setAttribute('content', image);
        document.getElementById('meta-og-url').setAttribute('content', canonical);
        document.getElementById('meta-twitter-title').setAttribute('content', title);
        document.getElementById('meta-twitter-description').setAttribute('content', description);
        document.getElementById('meta-twitter-image').setAttribute('content', image);
        document.getElementById('meta-canonical').setAttribute('href', canonical);
    }

    function renderTable(tableText) {
        const lines = tableText.trim().split(/\n/);
        const attrs = (lines[0].match(/^\{\|\s*(.*)$/) || [,''])[1];
        let caption = '';
        const rows = [];
        let currentRow = [];
        let currentCell = null;

        function finalizeCell() {
            if (!currentCell) return;
            currentRow.push(currentCell);
            currentCell = null;
        }

        function finalizeRow() {
            finalizeCell();
            if (currentRow.length) rows.push(currentRow);
            currentRow = [];
        }

        function parseCellSegment(segment, tag) {
            const trimmed = segment.trim();
            const pipeIndex = trimmed.indexOf('|');
            if (pipeIndex !== -1) {
                const maybeAttrs = trimmed.slice(0, pipeIndex).trim();
                const value = trimmed.slice(pipeIndex + 1).trim();
                if (maybeAttrs && /=/.test(maybeAttrs)) {
                    return { tag, attrs: maybeAttrs, content: value };
                }
            }
            return { tag, attrs: '', content: trimmed };
        }

        function renderTableCellContent(content) {
            const text = String(content || '').trim();
            if (!text) return '';
            const lines = text.split(/\n/).map(line => line.trim()).filter(Boolean);
            if (lines.length && lines.every(line => /^([*#]+)\s+/.test(line))) return renderLists(lines.join('\n'));
            if (lines.length && lines.every(line => /^[;:]\s*/.test(line))) return renderDefinitionList(lines.join('\n'));
            return parseInline(text.replace(/\n+/g, '<br>'));
        }

        function cellHtml(cell) {
            const attrText = cell.attrs ? ` ${cell.attrs}` : '';
            return `<${cell.tag}${attrText}>${renderTableCellContent(cell.content)}</${cell.tag}>`;
        }

        for (let i = 1; i < lines.length; i++) {
            const raw = lines[i];
            const line = raw.trim();
            if (!line || line === '|}') continue;
            if (line.startsWith('|+')) {
                caption = `<caption>${parseInline(line.slice(2).trim())}</caption>`;
                continue;
            }
            if (line.startsWith('|-')) {
                finalizeRow();
                continue;
            }
            if (line.startsWith('!') || line.startsWith('|')) {
                const tag = line.startsWith('!') ? 'th' : 'td';
                const separator = tag === 'th' ? /!!/ : /\|\|/;
                finalizeCell();
                const segments = line.slice(1).split(separator);
                segments.forEach((segment, index) => {
                    const cell = parseCellSegment(segment, tag);
                    if (index < segments.length - 1) currentRow.push(cell);
                    else currentCell = cell;
                });
                continue;
            }
            if (currentCell) currentCell.content += `\n${raw}`;
        }

        finalizeRow();

        return `<table ${attrs ? attrs : 'class="wikitable"'}>${caption}${rows.map(row => `<tr>${row.map(cellHtml).join('')}</tr>`).join('')}</table>`;
    }

    function renderInfobox(source) {
        const body = source.replace(/^\{\{Infobox\s*/i, '').replace(/\}\}\s*$/i, '');
        const lines = body.split(/\n/).map(line => line.trim()).filter(Boolean);
        let rows = '';
        for (const line of lines) {
            if (!line.startsWith('|')) continue;
            const clean = line.slice(1);
            const idx = clean.indexOf('=');
            if (idx === -1) continue;
            const key = clean.slice(0, idx).trim();
            const value = clean.slice(idx + 1).trim();
            if (/^title$/i.test(key)) {
                rows += `<tr><th colspan="2" class="infobox-header">${parseInline(value)}</th></tr>`;
            } else if (/^header\d*$/i.test(key)) {
                rows += `<tr><th colspan="2" class="infobox-subheader">${parseInline(value)}</th></tr>`;
            } else if (/^image$/i.test(key)) {
                rows += `<tr><td colspan="2" class="infobox-image">${parseInline(value)}</td></tr>`;
            } else {
                rows += `<tr><th class="infobox-label">${escapeHtml(key.replace(/_/g, ' '))}</th><td>${parseInline(value)}</td></tr>`;
            }
        }
        return `<table class="infobox">${rows}</table>`;
    }

    function renderGallery(source) {
        const inner = source.replace(/<gallery>/i, '').replace(/<\/gallery>/i, '').trim();
        const items = inner.split(/\n/).map(line => line.trim()).filter(Boolean).map(line => {
            const [target, caption = ''] = line.split('|');
            return `<li class="gallerybox">${renderFileLink(`[[${target}|center|120px|${caption.trim()}]]`)}</li>`;
        }).join('');
        return `<ul class="gallery">${items}</ul>`;
    }

    function renderFileLink(markup) {
        const match = markup.match(/^\[\[(?:File|Image):(.+?)\]\]$/i);
        if (!match) return escapeHtml(markup);
        const parts = match[1].split('|').map(part => part.trim()).filter(Boolean);
        const src = parts.shift() || '';
        let alignClass = '';
        let width = '';
        let caption = '';
        let thumb = false;
        for (const part of parts) {
            if (/^(thumb|thumbnail|frame|frameless)$/i.test(part)) thumb = true;
            else if (/^(right)$/i.test(part)) alignClass = 'tright';
            else if (/^(left)$/i.test(part)) alignClass = 'tleft';
            else if (/^(center|centre)$/i.test(part)) alignClass = 'tcenter';
            else if (/^\d+px$/i.test(part)) width = part;
            else caption = part;
        }
        const style = width ? ` style="width:${safeAttr(width)};"` : '';
        const img = `<img src="${safeAttr(src)}" alt="${safeAttr(caption || src.split('/').pop())}"${width ? ` style="width:${safeAttr(width)};"` : ''}>`;
        if (thumb || caption || alignClass) {
            return `<div class="thumb ${alignClass}"><div class="thumbinner"${style}>${img}${caption ? `<div class="thumbcaption">${parseInline(caption)}</div>` : ''}</div></div>`;
        }
        return img;
    }

    function renderHatnote(templateName, payload) {
        const parts = payload.split('|').map(part => part.trim()).filter(Boolean);
        if (!parts.length) return '';
        if (/^Main$/i.test(templateName)) {
            const links = parts.map(part => `[[${part}]]`).join(', ');
            return `<div class="hatnote">Main article: ${parseInline(links)}</div>`;
        }
        if (/^See also$/i.test(templateName)) {
            const links = parts.map(part => `[[${part}]]`).join(', ');
            return `<div class="hatnote">See also: ${parseInline(links)}</div>`;
        }
        if (/^About$/i.test(templateName)) {
            return `<div class="hatnote">${parseInline(parts.join(' | '))}</div>`;
        }
        return '';
    }

    function parseInline(text) {
        let html = String(text || '');
        html = html.replace(/<math>([\s\S]*?)<\/math>/gi, (_, expr) => `<span class="math-inline">\\(${escapeHtml(expr.trim())}\\)</span>`);
        html = html.replace(/\{\{sfrac\|([^|{}]+)\|([^{}]+)\}\}/gi, (_, a, b) => `<sup>${escapeHtml(a.trim())}</sup>&frasl;<sub>${escapeHtml(b.trim())}</sub>`);
        html = html.replace(/\[\[(?:File|Image):[\s\S]+?\]\]/gi, match => renderFileLink(match));
        html = html.replace(/\[([^\s\]]+):\/\/([^\s\]]+)(?:\s+([^\]]+))?\]/g, (m, proto, rest, label) => {
            const href = `${proto}://${rest}`;
            return `<a class="external" href="${safeAttr(href)}" target="_blank" rel="noopener">${escapeHtml(label || href)}</a>`;
        });
        html = html.replace(/(?<!["'=])(https?:\/\/[^\s<]+)/g, url => `<a class="external" href="${safeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>`);
        html = html.replace(/\[\[([^\]|#]+)#([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, page, section, label) => {
            const slug = normalizeSlug(page);
            const anchor = titleToSlug(section);
            return `<a class="${isKnownPage(slug) ? '' : 'redlink'}" href="#/${safeAttr(slug)}#${safeAttr(anchor)}">${escapeHtml(label || section)}</a>`;
        });
        html = html.replace(/\[\[#([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, section, label) => `<a href="#${safeAttr(titleToSlug(section))}">${escapeHtml(label || section)}</a>`);
        html = html.replace(/\[\[:Category:([^\]|]+)(?:\|([^\]]+))?\]\]/gi, (_, cat, label) => `<a href="#/${safeAttr(normalizeSlug('Category:' + cat))}">${escapeHtml(label || ('Category:' + cat))}</a>`);
        html = html.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, target, label) => {
            const slug = normalizeSlug(target);
            const known = isKnownPage(slug);
            return `<a class="${known ? '' : 'redlink'}" href="#/${safeAttr(slug)}">${escapeHtml(label || slugToTitle(target))}</a>`;
        });
        html = html.replace(/'''''([\s\S]+?)'''''/g, '<b><i>$1</i></b>');
        html = html.replace(/'''([\s\S]+?)'''/g, '<b>$1</b>');
        html = html.replace(/''([\s\S]+?)''/g, '<i>$1</i>');
        return html;
    }

    function renderLists(block) {
        const lines = block.split('\n');
        let html = '';
        const stack = [];
        const listType = marker => marker.includes('#') ? 'ol' : 'ul';
        const closeTo = targetDepth => {
            while (stack.length > targetDepth) {
                html += `</li></${stack.pop()}>`;
            }
        };
        lines.forEach(line => {
            const match = line.match(/^([*#]+)\s*(.*)$/);
            if (!match) return;
            const markers = match[1];
            const depth = markers.length;
            const type = listType(markers);
            while (stack.length < depth) {
                stack.push(type);
                html += `<${type}><li>`;
            }
            while (stack.length > depth) {
                html += `</li></${stack.pop()}>`;
            }
            if (stack[stack.length - 1] !== type) {
                html += `</li></${stack.pop()}><${type}><li>`;
                stack.push(type);
            } else if (!html.endsWith('<li>')) {
                html += '</li><li>';
            }
            html += parseInline(match[2]);
        });
        closeTo(0);
        return html;
    }

    function renderDefinitionList(block) {
        const lines = block.split('\n').map(line => line.trim()).filter(Boolean);
        return `<dl>${lines.map(line => {
            if (line.startsWith(';')) return `<dt>${parseInline(line.slice(1).trim())}</dt>`;
            if (line.startsWith(':')) return `<dd>${parseInline(line.slice(1).trim())}</dd>`;
            return '';
        }).join('')}</dl>`;
    }

    function protectBlocks(html, refsState) {
        const protectedBlocks = [];
        const protect = content => {
            protectedBlocks.push(content);
            return `%%%PROTECTED_${protectedBlocks.length - 1}%%%`;
        };

        html = html.replace(/<syntaxhighlight(?:[^>]*)>([\s\S]*?)<\/syntaxhighlight>/gi, (_, code) => protect(`<pre class="mw-highlight">${escapeHtml(code)}</pre>`));
        html = html.replace(/<pre>([\s\S]*?)<\/pre>/gi, (_, code) => protect(`<pre>${escapeHtml(code)}</pre>`));
        html = html.replace(/<poem>([\s\S]*?)<\/poem>/gi, (_, poem) => protect(`<div class="poem">${escapeHtml(poem.trim())}</div>`));
        html = html.replace(/<score>([\s\S]*?)<\/score>/gi, (_, score) => protect(`<div class="score-block">${escapeHtml(score.trim())}</div>`));
        html = html.replace(/<gallery>([\s\S]*?)<\/gallery>/gi, source => protect(renderGallery(source)));
        html = html.replace(/\{\|[\s\S]*?\|\}/g, table => protect(renderTable(table)));
        html = html.replace(/\{\{Infobox[\s\S]*?\}\}/gi, box => protect(renderInfobox(box)));

        html = html.replace(/<ref\s+name=["']([^"']+)["']\s*\/>/gi, (_, name) => {
            if (!refsState.named[name]) return '';
            const n = refsState.named[name].index;
            return `<sup class="reference"><a href="#cite_note-${n}">[${n}]</a></sup>`;
        });

        html = html.replace(/<ref([^>]*)>([\s\S]*?)<\/ref>/gi, (_, attrs, content) => {
            const nameMatch = attrs.match(/name=["']([^"']+)["']/i);
            const text = content.trim();
            if (nameMatch) {
                const name = nameMatch[1];
                if (refsState.named[name]) {
                    const n = refsState.named[name].index;
                    return `<sup class="reference"><a href="#cite_note-${n}">[${n}]</a></sup>`;
                }
                refsState.refs.push(text);
                refsState.named[name] = { index: refsState.refs.length, text };
                return `<sup class="reference"><a href="#cite_note-${refsState.refs.length}">[${refsState.refs.length}]</a></sup>`;
            }
            refsState.refs.push(text);
            return `<sup class="reference"><a href="#cite_note-${refsState.refs.length}">[${refsState.refs.length}]</a></sup>`;
        });

        return { html, protectedBlocks };
    }

    function restoreBlocks(html, protectedBlocks) {
        protectedBlocks.forEach((block, i) => {
            html = html.split(`%%%PROTECTED_${i}%%%`).join(block);
        });
        return html;
    }

    function parseWikitext(text, pageSlug) {
        let html = String(text || '').replace(/\r\n?/g, '\n');
        currentCategories = [];
        currentShortDescription = '';

        html = html.replace(/<!--([\s\S]*?)-->/g, '');
        html = html.replace(/\{\{short description\|([^{}]+)\}\}/i, (_, desc) => {
            currentShortDescription = desc.trim();
            return '';
        });

        html = html.replace(/\[\[Category:([^\]|]+)(?:\|[^\]]*)?\]\]/gi, (_, category) => {
            currentCategories.push(category.trim());
            return '';
        });

        html = html.replace(/\{\{(Main|See also|About)\|([\s\S]*?)\}\}/gi, (_, name, payload) => renderHatnote(name, payload));
        html = html.replace(/\{\{Quote\|([\s\S]*?)(?:\|([\s\S]*?))?\}\}/gi, (_, quote, author) => `<div class="quote-box">${parseInline(quote.trim())}${author ? `<span class="quote-author">${parseInline(author.trim())}</span>` : ''}</div>`);

        const refsState = { refs: [], named: {} };
        const protectedResult = protectBlocks(html, refsState);
        html = protectedResult.html;
        const protectedBlocks = protectedResult.protectedBlocks;

        const lines = html.split('\n');
        const rendered = [];
        const toc = [];

        for (let i = 0; i < lines.length; ) {
            const line = lines[i];
            if (!line.trim()) {
                rendered.push('');
                i++;
                continue;
            }
            if (/^%%%PROTECTED_\d+%%%$/.test(line.trim()) || /^<div class="hatnote">/.test(line.trim()) || /^<div class="quote-box">/.test(line.trim())) {
                rendered.push(line);
                i++;
                continue;
            }
            const headingMatch = line.match(/^(={1,6})\s*(.*?)\s*\1$/);
            if (headingMatch) {
                const level = Math.min(headingMatch[1].length, 6);
                const title = headingMatch[2].trim();
                const id = titleToSlug(title).replace(/[^A-Za-z0-9_:-]/g, '_');
                toc.push({ level, title, id });
                rendered.push(`<h${level} id="${safeAttr(id)}">${parseInline(title)}</h${level}>`);
                i++;
                continue;
            }
            if (/^([*#]+)\s+/.test(line)) {
                const block = [];
                while (i < lines.length && /^([*#]+)\s+/.test(lines[i])) {
                    block.push(lines[i]);
                    i++;
                }
                rendered.push(renderLists(block.join('\n')));
                continue;
            }
            if (/^[;:]\s*/.test(line)) {
                const block = [];
                while (i < lines.length && /^[;:]\s*/.test(lines[i])) {
                    block.push(lines[i]);
                    i++;
                }
                rendered.push(renderDefinitionList(block.join('\n')));
                continue;
            }
            if (/^----\s*$/.test(line)) {
                rendered.push('<hr>');
                i++;
                continue;
            }
            const paragraph = [];
            while (i < lines.length && lines[i].trim() && !/^([*#]+)\s+/.test(lines[i]) && !/^[;:]\s*/.test(lines[i]) && !/^(={1,6})\s*(.*?)\s*\1$/.test(lines[i]) && !/^----\s*$/.test(lines[i]) && !/^%%%PROTECTED_\d+%%%$/.test(lines[i].trim()) && !/^<div class="hatnote">/.test(lines[i].trim()) && !/^<div class="quote-box">/.test(lines[i].trim())) {
                paragraph.push(lines[i]);
                i++;
            }
            rendered.push(`<p>${parseInline(paragraph.join(' '))}</p>`);
        }

        html = rendered.join('\n');
        html = restoreBlocks(html, protectedBlocks);

        const reflist = refsState.refs.length
            ? `<ol class="references">${refsState.refs.map((entry, idx) => `<li id="cite_note-${idx + 1}"><span class="mw-cite-backlink">^</span>${parseInline(entry)}</li>`).join('')}</ol>`
            : '';
        html = html.replace(/\{\{reflist\}\}|<references\s*\/>/gi, reflist);

        if (toc.length >= 3) {
            const tocHtml = `<div class="toc"><div class="toc-title"><h2>Contents</h2></div><ul>${toc.map((item, idx) => `<li class="toc-level-${item.level}"><span class="toc-number">${idx + 1}</span><a href="#${safeAttr(item.id)}">${escapeHtml(item.title)}</a></li>`).join('')}</ul></div>`;
            html = tocHtml + html;
        }

        return html;
    }

    function renderMath() {
        if (window.renderMathInElement) {
            renderMathInElement(contentDiv, {
                delimiters: [
                    { left: '\\(', right: '\\)', display: false },
                    { left: '\\[', right: '\\]', display: true }
                ],
                throwOnError: false
            });
        }
    }

    async function buildCategoryPage(slug) {
        await loadIndex();
        const categoryName = slug.replace(/^Category:/, '').replace(/_/g, ' ');
        const hits = (siteIndex || []).filter(item => Array.isArray(item.categories) && item.categories.some(cat => titleToSlug(cat) === titleToSlug(categoryName)));
        const list = hits.length ? hits.map(item => `* [[${item.slug || titleToSlug(item.title)}|${item.title || slugToTitle(item.slug)}]]`).join('\n') : `''No pages currently assigned to this category.''`;
        return `= Category: ${categoryName} =\nThe following pages are indexed under this category.\n\n== Pages in category "${categoryName}" ==\n${list}`;
    }

    async function buildAllPagesPage() {
        await loadIndex();
        const pages = (siteIndex || []).filter(item => !/^Category:/.test(normalizeSlug(item.slug || item.title)) && !/^Special:/.test(normalizeSlug(item.slug || item.title))).sort((a, b) => (a.title || slugToTitle(a.slug)).localeCompare(b.title || slugToTitle(b.slug)));
        const list = pages.map(item => `* [[${item.slug || titleToSlug(item.title)}|${item.title || slugToTitle(item.slug)}]]`).join('\n');
        return `= All pages =\n\n${list || "''No indexed pages were found.''"}`;
    }

    async function buildCategoriesPage() {
        await loadIndex();
        const map = new Map();
        (siteIndex || []).forEach(item => {
            (item.categories || []).forEach(cat => map.set(cat, (map.get(cat) || 0) + 1));
        });
        const list = Array.from(map.entries()).sort((a, b) => a[0].localeCompare(b[0])).map(([cat, count]) => `* [[Category:${titleToSlug(cat)}|${cat}]] (${count})`).join('\n');
        return `= Categories =\n\n${list || "''No indexed categories were found.''"}`;
    }

    async function buildSitemapPage() {
        await loadIndex();
        const pages = (siteIndex || []).slice().sort((a, b) => (a.title || slugToTitle(a.slug)).localeCompare(b.title || slugToTitle(b.slug)));
        const list = pages.map(item => {
            const title = item.title || slugToTitle(item.slug);
            const slug = item.slug || titleToSlug(title);
            const summary = item.description || item.summary || '';
            return `* [[${slug}|${title}]]${summary ? ` - ${summary}` : ''}`;
        }).join('\n');
        return `= Sitemap =\n\n${list || "''No indexed pages were found.''"}`;
    }

    async function buildRecentChangesPage() {
        await loadIndex();
        const dated = (siteIndex || []).filter(item => item.lastModified).sort((a, b) => String(b.lastModified).localeCompare(String(a.lastModified)));
        if (!dated.length) return `= Recent changes =\n\n''No modification dates are available in the current index.''`;
        return `= Recent changes =\n\n` + dated.map(item => `* [[${item.slug || titleToSlug(item.title)}|${item.title || slugToTitle(item.slug)}]] - ${item.lastModified}`).join('\n');
    }

    async function buildSearchPage(query) {
        await loadIndex();
        const q = String(query || '').trim().toLowerCase();
        const hits = (siteIndex || []).filter(item => {
            const title = String(item.title || slugToTitle(item.slug)).toLowerCase();
            const slug = String(item.slug || '').toLowerCase();
            const summary = String(item.description || item.summary || '').toLowerCase();
            return q && (title.includes(q) || slug.includes(q) || summary.includes(q));
        });
        if (!q) return `= Search =\nEnter a term in the search box.`;
        if (!hits.length) return `= Search: ${query} =\n\nNo indexed pages matched '''${query}'''.`;
        return `= Search: ${query} =\n\n` + hits.map(item => `* [[${item.slug || titleToSlug(item.title)}|${item.title || slugToTitle(item.slug)}]]${item.description ? ` - ${item.description}` : ''}`).join('\n');
    }

    async function buildWhatLinksHerePage(targetSlug) {
        const target = normalizeSlug(targetSlug || currentSlug || appConfig.defaultPage);
        const pattern = new RegExp(`\\[\\[(?:${target.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&')}|${slugToTitle(target).replace(/[.*+?^${}()|[\\]\\]/g, '\\$&')})(?:[|#\\]])`, 'i');
        const embeddedHits = Array.from(document.querySelectorAll('script[data-slug]')).map(node => ({ slug: normalizeSlug(node.dataset.slug), raw: node.textContent })).filter(item => item.slug !== target && pattern.test(item.raw)).map(item => item.slug);
        const unique = [...new Set(embeddedHits)];
        if (!unique.length) {
            return `= What links here =\n\nNo embedded pages currently link to [[${target}|${slugToTitle(target)}]].\n\nIf you use a site index with explicit link data, this special page can be expanded further.`;
        }
        return `= What links here =\n\nPages linking to [[${target}|${slugToTitle(target)}]]:\n\n` + unique.map(slug => `* [[${slug}|${slugToTitle(slug)}]]`).join('\n');
    }

    function resolveSpecialPage(slug) {
        if (slug === 'Special:Random') return { type: 'random' };
        if (slug === 'Special:Sitemap') return { type: 'generated', build: () => buildSitemapPage() };
        if (slug === 'Special:AllPages') return { type: 'generated', build: () => buildAllPagesPage() };
        if (slug === 'Special:Categories') return { type: 'generated', build: () => buildCategoriesPage() };
        if (slug === 'Special:RecentChanges') return { type: 'generated', build: () => buildRecentChangesPage() };
        if (slug.startsWith('Special:Search/')) return { type: 'generated', build: () => buildSearchPage(slug.replace(/^Special:Search\//, '').replace(/_/g, ' ')) };
        if (slug === 'Special:Search') return { type: 'generated', build: () => buildSearchPage('') };
        if (slug.startsWith('Special:WhatLinksHere/')) return { type: 'generated', build: () => buildWhatLinksHerePage(slug.replace(/^Special:WhatLinksHere\//, '')) };
        if (slug === 'Special:WhatLinksHere') return { type: 'generated', build: () => buildWhatLinksHerePage(currentSlug) };
        if (slug.startsWith('Category:')) return { type: 'generated', build: () => buildCategoryPage(slug) };
        return null;
    }

    function renderSourcePage(slug, raw, resolvedFrom) {
        currentCategories = [...raw.matchAll(/\[\[Category:([^\]|]+)(?:\|[^\]]*)?\]\]/gi)].map(match => match[1].trim());
        headingDiv.textContent = slugToTitle(slug);
        subHeadingDiv.textContent = resolvedFrom ? `Source: ${resolvedFrom}` : appConfig.siteTagline;
        contentDiv.innerHTML = `<h3>Raw source</h3><pre>${escapeHtml(raw)}</pre>`;
        showStatus('', false);
        renderChrome(currentCategories);
    }

    async function renderReadPage(slug, raw, resolvedFrom, notFound = false) {
        const front = parseFrontMatter(raw);
        const redirectMatch = front.body.match(/^#REDIRECT\s*\[\[([^\]]+)\]\]/i);
        if (redirectMatch) {
            navigateTo(redirectMatch[1]);
            return;
        }
        const html = parseWikitext(front.body, slug);
        const title = front.meta.title || slugToTitle(slug);
        headingDiv.textContent = title;
        subHeadingDiv.textContent = appConfig.siteTagline;
        contentDiv.innerHTML = html;
        showStatus(notFound ? `This page is linked, but not created yet. Suggested file path: <span class="new-page-path">${escapeHtml(creationPath(slug))}</span>` : '', notFound);
        updateMeta(slug, front.meta);
        await renderChrome(currentCategories);
        renderMath();
    }

    async function loadPage(slug, mode = 'read') {
        const normalized = normalizeSlug(slug);
        currentSlug = normalized;
        loader.style.display = 'block';
        contentDiv.innerHTML = '';
        setTab(mode);
        await loadIndex();
        cachedPageRegistry = null;

        const special = resolveSpecialPage(normalized);
        if (special && special.type === 'random') {
            navigateTo(randomPageSlug());
            return;
        }

        let payload;
        if (special && special.type === 'generated') {
            const raw = await special.build();
            payload = { raw, resolvedFrom: 'generated', notFound: false };
        } else {
            payload = await fetchPageText(normalized);
        }

        currentRaw = payload.raw;
        currentResolvedFrom = payload.resolvedFrom || '';

        if (mode === 'source') {
            renderSourcePage(normalized, payload.raw, payload.resolvedFrom);
        } else {
            await renderReadPage(normalized, payload.raw, payload.resolvedFrom, !!payload.notFound);
        }

        loader.style.display = 'none';
        window.scrollTo(0, 0);
    }

    document.getElementById('search-form').addEventListener('submit', event => {
        event.preventDefault();
        const q = document.getElementById('searchInput').value.trim();
        document.getElementById('searchInput').value = '';
        navigateTo(q ? `Special:Search/${titleToSlug(q)}` : 'Special:Search');
    });

    viewSourceBtn.addEventListener('click', () => {
        const nextMode = currentViewMode === 'source' ? 'read' : 'source';
        currentViewMode = nextMode;
        loadPage(currentSlug || getPageId(), nextMode);
    });

    window.addEventListener('hashchange', () => loadPage(getPageId(), currentViewMode === 'source' ? 'source' : 'read'));

    footerLicenseDiv.innerHTML = appConfig.licenseHtml;
    loadPage(getPageId(), 'read');
    </script>
</body>
