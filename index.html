<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metopedia</title>
  <meta name="description" content="Metopedia is a standalone Wikipedia-like wiki ecosystem." />
  <style>
    :root {
      --bg: #f6f6f6;
      --surface: #fff;
      --border: #a2a9b1;
      --text: #202122;
      --muted: #54595d;
      --link: #0645ad;
      --red: #ba0000;
      --heading: 'Linux Libertine', Georgia, 'Times New Roman', serif;
      --body: sans-serif;
      --code: Consolas, 'Courier New', monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: .875em/1.6 var(--body); background: var(--bg); color: var(--text); }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    #mw-page-base { height: 5em; background: linear-gradient(to bottom,#fff 50%,#f6f6f6 100%); }
    #mw-head-base { margin-top: -5em; margin-left: 11em; height: 5em; }
    #mw-panel { position: absolute; top: 0; left: 0; width: 11em; padding-top: 1em; }
    #content { margin-left: 11em; background: var(--surface); border: 1px solid var(--border); border-top: 0; border-right: 0; min-height: 100vh; padding: 1.25em 1.5em; }

    #p-logo { display:block; width:11em; text-align:center; color:#000; text-decoration:none; margin-bottom: 1em; }
    #p-logo-mark { width: 8em; height: 8em; margin: 0 auto .25em; background: center/contain no-repeat url('https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Wikipedia-logo-v2.svg/120px-Wikipedia-logo-v2.svg.png'); }
    #p-logo-text { font-family: var(--heading); font-size: 1.35em; letter-spacing: 1px; }

    .portal { margin: 0 .6em 0 .7em; }
    .portal h3 { margin: .6em 0 0 .66em; padding:.25em 0; font-size:.75em; font-weight:400; color:var(--muted); border-bottom:1px solid #c8ccd1; }
    .portal ul { list-style:none; margin: 0; padding: .3em 0 0; }
    .portal li { font-size:.75em; padding:.2em 0; }

    #left-navigation, #right-navigation { margin-top:2.5em; margin-bottom:-1px; }
    #left-navigation { float:left; }
    #right-navigation { float:right; }
    .vectorTabs { float:left; height:2.5em; }
    .vectorTabs ul { margin:0; padding:0; list-style:none; display:flex; height:100%; }
    .vectorTabs li { border:1px solid #a7d7f9; border-bottom:none; background:linear-gradient(to bottom,#fff 65%,#eaf3ff); margin-right:1px; }
    .vectorTabs li.selected { background:#fff; }
    .vectorTabs a, .vectorTabs button { display:block; height:2.5em; padding:1.15em .7em 0; border:0; background:none; font:inherit; color:var(--link); cursor:pointer; font-size:.8em; }

    #p-search { float:left; margin:2.8em .8em 0 .4em; }
    #simpleSearch { display:flex; width:20vw; max-width:20em; min-width:9em; border:1px solid var(--border); background:#fff; padding:.2em .4em; }
    #simpleSearch input { border:0; outline:0; flex:1; font-size:.85em; }
    #simpleSearch button { border:0; background:none; cursor:pointer; }

    #firstHeading { font-family:var(--heading); font-size:1.8em; font-weight:400; margin:.1em 0 .25em; border-bottom:1px solid var(--border); }
    #siteSub { color:var(--muted); font-size:84%; margin:0 0 1em; }
    #pageStatus { display:none; margin: 0 0 1em; padding:.6em .8em; border:1px solid #c8ccd1; background:#f8f9fa; }

    .mw-parser-output h2 { font-family:var(--heading); font-size:1.5em; font-weight:400; border-bottom:1px solid var(--border); margin:1em 0 .25em; clear:both; }
    .mw-parser-output h3 { font-size:1.15em; margin:.75em 0 .2em; }
    .mw-parser-output p { margin:.5em 0; }
    .mw-parser-output pre { border:1px dashed #2f6fab; background:#f8f9fa; padding:1em; overflow:auto; font-family:var(--code); }
    .mw-parser-output code, .mw-parser-output kbd { font-family:var(--code); background:#f8f9fa; border:1px solid #eaecf0; padding:1px 4px; }

    .infobox { float:right; width:22em; max-width:100%; margin:0 0 1em 1em; border:1px solid var(--border); background:#f8f9fa; border-collapse: collapse; font-size:88%; }
    .infobox th, .infobox td { border:1px solid #d0d4d8; padding:.25em .5em; vertical-align:top; }
    .infobox .infobox-header, .infobox .infobox-subheader { text-align:center; font-weight:700; background:#eaecf0; }
    .infobox .infobox-label { width:35%; font-weight:700; background:#eaecf0; }

    .wikitable { border-collapse:collapse; background:#f8f9fa; border:1px solid var(--border); margin:1em 0; }
    .wikitable caption { font-weight:700; padding:.3em; }
    .wikitable th, .wikitable td { border:1px solid var(--border); padding:.25em .45em; }
    .wikitable th { background:#eaecf0; }

    .thumb { border:1px solid #c8ccd1; background:#f8f9fa; padding:3px; max-width:100%; }
    .tright { float:right; clear:right; margin:0 0 1em 1em; }
    .tleft { float:left; clear:left; margin:0 1em 1em 0; }
    .thumbcaption { font-size:94%; color:var(--muted); }

    .toc { float:right; clear:right; width:18em; border:1px solid var(--border); background:#f8f9fa; padding:7px; margin:0 0 1em 1em; font-size:95%; }
    .toc ul { list-style:none; margin:0; padding:0; }
    .toc-title { text-align:center; font-weight:700; margin-bottom:.3em; }

    .hatnote { font-style:italic; color:var(--muted); margin:.35em 0; }
    .quote-box { margin:1em 2em; padding:1em; border-left:4px solid #c8ccd1; background:#f8f9fa; }
    .poem { white-space:pre-wrap; font-style:italic; margin:1em 2em; }

    .references { font-size:90%; }
    .reference { font-size:80%; vertical-align:super; }
    .catlinks { border:1px solid var(--border); background:#f8f9fa; margin-top:1.5em; padding:.5em; font-size:90%; }
    .catlinks ul { list-style:none; margin:0; padding:0; display:inline; }
    .catlinks li { display:inline-block; border-left:1px solid var(--border); padding:0 .5em; }
    .catlinks li:first-child { border-left:0; }

    #footer { margin-left:11em; padding:1.25em; font-size:.75em; border-top:1px solid var(--border); }

    .mp-grid { display:grid; grid-template-columns: 2fr 1fr; gap: 1em; }
    .mp-box { border:1px solid var(--border); background:#f8f9fa; padding:.6em; }

    @media (max-width: 1080px) {
      #mw-panel { display:none; }
      #mw-head-base, #content, #footer { margin-left:0; }
      #mw-head-base { margin-top:0; height:auto; padding:.6em; display:flex; flex-direction:column; gap:.45em; }
      #left-navigation,#right-navigation,#p-search,.vectorTabs { float:none; }
      #simpleSearch { width:100%; max-width:none; }
      #content { border-right:1px solid var(--border); padding:1em; }
      .infobox,.toc,.tright,.tleft { float:none; width:100%; margin:0 0 1em; }
      .mp-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="mw-page-base"></div>
  <div id="mw-head-base">
    <div id="left-navigation"><div class="vectorTabs"><ul><li class="selected"><a>Read</a></li><li><button id="view-source-btn" type="button">View source</button></li></ul></div></div>
    <div id="right-navigation">
      <div id="p-search">
        <form id="search-form"><div id="simpleSearch"><input id="searchInput" type="search" placeholder="Search Metopedia"/><button type="submit">⌕</button></div></form>
      </div>
    </div>
  </div>

  <div id="mw-panel">
    <a id="p-logo" href="#/Main_Page"><div id="p-logo-mark"></div><span id="p-logo-text">METOPEDIA</span></a>
    <div id="sidebar-container"></div>
  </div>

  <div id="content">
    <h1 id="firstHeading">Loading…</h1>
    <div id="siteSub">From Metopedia, the free encyclopedia</div>
    <div id="pageStatus"></div>
    <div id="bodyContent" class="mw-parser-output"><div id="rendered-content">Loading article…</div></div>
  </div>

  <div id="footer"><div id="footer-content"></div></div>

<script>
const ARTICLE_ROOT = './articles';
const LAYOUT_ROOT = './layout';
const PROD_BASES = [
  '.',
  'https://raw.githubusercontent.com/metopedia/metopedia/main'
];

const state = { refs: [], categories: [] };

function escapeHtml(s='') { return s.replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

function slugifyTitle(title){ return title.replace(/\s+/g,'_'); }
function deslugify(title){ return decodeURIComponent(title).replace(/_/g,' '); }

async function productionFetch(path) {
  let lastErr = null;
  for (const base of PROD_BASES) {
    const url = `${base}${path.startsWith('/') ? path : '/' + path}`;
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (res.ok) return { ok: true, text: await res.text(), url };
      if (res.status === 404) continue;
      lastErr = new Error(`HTTP ${res.status} on ${url}`);
    } catch (err) { lastErr = err; }
  }
  return { ok: false, error: lastErr || new Error('Not found') };
}

function parseInline(text) {
  return text
    .replace(/<nowiki>([\s\S]*?)<\/nowiki>/g, (_,x)=>`<code>${escapeHtml(x)}</code>`)
    .replace(/<small>([\s\S]*?)<\/small>/g,'<small>$1</small>')
    .replace(/<sub>([\s\S]*?)<\/sub>/g,'<sub>$1</sub>')
    .replace(/<sup>([\s\S]*?)<\/sup>/g,'<sup>$1</sup>')
    .replace(/<kbd>([\s\S]*?)<\/kbd>/g,'<kbd>$1</kbd>')
    .replace(/\[\[(?!Category:)([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_,page,label)=>`<a href="#/${encodeURIComponent(page.trim().replace(/ /g,'_'))}">${label||page}</a>`)
    .replace(/(https?:\/\/[^\s<]+)/g,'<a class="external" target="_blank" rel="noopener" href="$1">$1</a>')
    .replace(/'''([^']+?)'''/g,'<strong>$1</strong>')
    .replace(/''([^']+?)''/g,'<em>$1</em>');
}

function renderInfobox(body) {
  const lines = body.split('\n').map(l=>l.trim()).filter(Boolean);
  let rows = '';
  for (const line of lines) {
    if (!line.startsWith('|')) continue;
    const raw = line.slice(1).trim();
    const [k, ...rest] = raw.split('=');
    if (!rest.length) continue;
    const key = k.trim();
    const val = parseInline(rest.join('=').trim());
    if (/^header\d*$/i.test(key) || /^title$/i.test(key)) rows += `<tr><th class="infobox-${/^title$/i.test(key)?'header':'subheader'}" colspan="2">${val}</th></tr>`;
    else rows += `<tr><th class="infobox-label">${escapeHtml(key)}</th><td>${val}</td></tr>`;
  }
  return `<table class="infobox"><tbody>${rows}</tbody></table>`;
}

function renderWikitable(block){
  const lines = block.split('\n');
  let caption=''; let rows=[]; let current=[];
  for (const line of lines) {
    const t=line.trim();
    if (t.startsWith('{|') || t==='|}') continue;
    if (t.startsWith('|+')) { caption = parseInline(t.slice(2).trim()); continue; }
    if (t==='|-') { if (current.length) rows.push(current), current=[]; continue; }
    if (t.startsWith('!')) current.push(`<th>${parseInline(t.slice(1).trim())}</th>`);
    else if (t.startsWith('|')) current.push(`<td>${parseInline(t.slice(1).trim())}</td>`);
  }
  if (current.length) rows.push(current);
  return `<table class="wikitable">${caption?`<caption>${caption}</caption>`:''}<tbody>${rows.map(r=>`<tr>${r.join('')}</tr>`).join('')}</tbody></table>`;
}

function parseMetotext(text) {
  state.refs=[]; state.categories=[];
  let out = text;

  out = out.replace(/\[\[Category:([^\]]+)\]\]/g, (_,c)=>{ state.categories.push(c.trim()); return ''; });
  out = out.replace(/<ref>([\s\S]*?)<\/ref>/g, (_,c)=>{ const n=state.refs.push(parseInline(c.trim())); return `<sup class="reference" id="cite_ref-${n}"><a href="#cite_note-${n}">[${n}]</a></sup>`; });
  out = out.replace(/<references\s*\/>/g, '__REFERENCES__');

  out = out.replace(/\{\{Main\|([^}]+)\}\}/g, (_,x)=>`<div class="hatnote">Main article: ${x.split('|').map(p=>`<a href="#/${slugifyTitle(p.trim())}">${p.trim()}</a>`).join(', ')}</div>`);
  out = out.replace(/\{\{See also\|([^}]+)\}\}/g, (_,x)=>`<div class="hatnote">See also: ${x.split('|').map(p=>`<a href="#/${slugifyTitle(p.trim())}">${p.trim()}</a>`).join(', ')}</div>`);
  out = out.replace(/\{\{Quote\|([^|}]+)\|?([^}]*)\}\}/g, (_,q,a)=>`<div class="quote-box">${parseInline(q)}${a?`<div style="text-align:right">— ${parseInline(a)}</div>`:''}</div>`);
  out = out.replace(/----/g,'<hr>');

  out = out.replace(/\{\{Infobox([\s\S]*?)\}\}/g, (_,b)=>renderInfobox(b));
  out = out.replace(/\{\|([\s\S]*?)\|\}/g, (m,b)=>renderWikitable(`{|${b}|}`));
  out = out.replace(/\[\[File:([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_,url,opts='')=>{
    const tokens = opts.split('|').map(x=>x.trim()).filter(Boolean);
    const align = tokens.includes('left')?'tleft':tokens.includes('center')?'tcenter':'tright';
    const width = tokens.find(t=>/px$/.test(t)) || '220px';
    const caption = parseInline(tokens[tokens.length-1] || '');
    return `<figure class="thumb ${align}" style="width:${width};"><img src="${url}" alt="${escapeHtml(caption)}"><figcaption class="thumbcaption">${caption}</figcaption></figure>`;
  });

  out = out.replace(/<syntaxhighlight[^>]*>([\s\S]*?)<\/syntaxhighlight>/g,(_,c)=>`<pre>${escapeHtml(c)}</pre>`)
           .replace(/<math>([\s\S]*?)<\/math>/g,(_,m)=>`<code>${escapeHtml(m)}</code>`)
           .replace(/<poem>([\s\S]*?)<\/poem>/g,(_,p)=>`<div class="poem">${escapeHtml(p)}</div>`)
           .replace(/<pre>([\s\S]*?)<\/pre>/g,(_,p)=>`<pre>${escapeHtml(p)}</pre>`);

  out = out.replace(/^======\s*(.*?)\s*======$/gm,'<h6>$1</h6>')
           .replace(/^=====\s*(.*?)\s*=====$/gm,'<h5>$1</h5>')
           .replace(/^====\s*(.*?)\s*====$/gm,'<h4>$1</h4>')
           .replace(/^===\s*(.*?)\s*===$/gm,'<h3>$1</h3>')
           .replace(/^==\s*(.*?)\s*==$/gm,'<h2>$1</h2>');

  out = out.replace(/^(\* .+)$/gm, m=>`<li>${parseInline(m.slice(2))}</li>`).replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m=>`<ul>${m}</ul>`);
  out = out.split(/\n{2,}/).map(block=>{
    if (/^<h\d|^<table|^<figure|^<ul>|^<div|^<pre|^<hr/.test(block.trim())) return block;
    return `<p>${parseInline(block.trim())}</p>`;
  }).join('\n');

  out = parseInline(out);

  const headings = [...out.matchAll(/<h2>(.*?)<\/h2>/g)];
  const toc = headings.length>1 ? `<div class="toc"><div class="toc-title">Contents</div><ul>${headings.map((h,i)=>`<li><a href="#sec-${i+1}">${i+1} ${h[1]}</a></li>`).join('')}</ul></div>` : '';
  let idx=0;
  out = out.replace(/<h2>(.*?)<\/h2>/g, (_,t)=>`<h2 id="sec-${++idx}">${t}</h2>`);

  if (out.includes('__REFERENCES__')) {
    const list = state.refs.length ? `<ol>${state.refs.map((r,i)=>`<li id="cite_note-${i+1}">${r} <a href="#cite_ref-${i+1}">↩</a></li>`).join('')}</ol>` : '<p>No references.</p>';
    out = out.replace('__REFERENCES__', `<div class="references">${list}</div>`);
  }

  const cat = state.categories.length ? `<div class="catlinks"><b>Categories</b>: <ul>${state.categories.map(c=>`<li><a href="#/Category:${slugifyTitle(c)}">${c}</a></li>`).join('')}</ul></div>` : '';
  return toc + out + cat;
}

async function loadSidebar() {
  const res = await productionFetch('/layout/_sidebar.md');
  const target = document.getElementById('sidebar-container');
  if (!res.ok) { target.innerHTML = '<div class="portal"><h3>Navigation</h3><ul><li><a href="#/Main_Page">Main Page</a></li></ul></div>'; return; }
  const lines = res.text.split('\n');
  let html='', list='';
  for (const line of lines) {
    const h = line.match(/^##\s+(.+)/); if (h) { if (list) html += `<ul>${list}</ul></div>`; html += `<div class="portal"><h3>${h[1]}</h3>`; list=''; continue; }
    const li = line.match(/^-\s+\[([^\]]+)\]\(#\/([^\)]+)\)/); if (li) list += `<li><a href="#/${li[2]}">${li[1]}</a></li>`;
  }
  if (list) html += `<ul>${list}</ul></div>`;
  target.innerHTML = html;
}

async function loadFooter() {
  const res = await productionFetch('/layout/_footer.md');
  const t = document.getElementById('footer-content');
  if (!res.ok) { t.textContent = 'Footer unavailable.'; return; }
  t.innerHTML = parseInline(res.text).replace(/\n/g,'<br>');
}

async function loadArticle(rawName) {
  const name = rawName || 'Main_Page';
  document.getElementById('firstHeading').textContent = deslugify(name);
  const status = document.getElementById('pageStatus');
  status.style.display='none';

  const path = `/${ARTICLE_ROOT.replace('./','')}/${name}.md`;
  const res = await productionFetch(path);
  if (!res.ok) {
    status.style.display='block';
    status.textContent = `This page (${name}) does not exist yet. Create ${path} in the repository.`;
    document.getElementById('rendered-content').innerHTML = '';
    return;
  }
  document.getElementById('rendered-content').innerHTML = parseMetotext(res.text);
}

function currentPage(){ return (location.hash.replace(/^#\/?/,'') || 'Main_Page'); }
function route(){ loadArticle(decodeURIComponent(currentPage())); }

document.getElementById('search-form').addEventListener('submit', (e)=>{
  e.preventDefault();
  const q = document.getElementById('searchInput').value.trim();
  if (q) location.hash = `/${encodeURIComponent(slugifyTitle(q))}`;
});

document.getElementById('view-source-btn').addEventListener('click', ()=>{
  const p = currentPage();
  window.open(`${ARTICLE_ROOT}/${p}.md`, '_blank');
});

window.addEventListener('hashchange', route);
Promise.all([loadSidebar(), loadFooter()]).then(route);
</script>
</body>
</html>
